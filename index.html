<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronômetro</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=VT323&display=swap" rel="stylesheet">
</head>

<body>
    <h1>Cronômetro</h1>

    <article id="cronometer">
        <section id="time-passed">00:00<span id="milisseconds">.00</span></section>
        <section id="buttons">
            <button type="button" id="start-pause-button">Iniciar</button>
            <button type="button" id="reset-button">Reiniciar</button>
            <button type="button" id="save-time">Salvar tempo</button>
        </section>
    </article>

    <section id="times-saved">
        <h2>Tempos Salvos</h2>
        
        <label for="filters">Filtrar por</label>
        <select name="filters" id="filters">
            <option value="most-recent">Mais recente</option>
            <option value="fastest">Mais curto</option>
            <option value="slowest">Mais longo</option>
        </select>

        <ol type="1" id="times-list">
            <li>12:25</li>
            <li>07:54</li>
            <li>56:20</li>
            <li>34:09</li>
        </ol>
    </section>
</body>
</html>
